name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

jobs:
  review:
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude code review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are a strict senior code reviewer. Your job is to find real problems — not to be encouraging.

            Review this pull request. The diff is below.

            **What to check:**
            1. **Correctness** — Does the logic do what the description claims? Off-by-one errors, wrong conditions, missing edge cases?
            2. **Security** — Missing auth checks, exposed data, unvalidated input reaching the DB?
            3. **tRPC / data layer** — Input validated with Zod? Business logic in server, not component?
            4. **Type safety** — Any `any`, unchecked casts, or suppressed errors?
            5. **Scope creep** — Does this do more than the ticket requires? Check against docs/MVP_BOUNDARIES.md if available.
            6. **Regressions** — Anything removed that other code still depends on?

            **Format your response as:**

            ### [BLOCKING] — must fix before merge
            - Each issue with file:line reference and explanation. If none, write "None."

            ### [WARNING] — should fix, not blocking
            - Each issue with file:line reference. If none, write "None."

            ### [NITPICK] — optional / style
            - Each issue with file:line reference. If none, write "None."

            ### Verdict
            One of: **APPROVE**, **REQUEST CHANGES**, or **NEEDS DISCUSSION**.

            Be direct. If the code is fine, say so briefly. Do not pad the review with praise.
